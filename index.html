      font-weight: 800;

    }

      font-size: 18px;
      font-weight: 800;
    }
    header .title p {
      font-size: 12px;
      opacity: .9;
    }

    .chat {
      padding: 18px 16px;
      overflow: auto;
      flex: 1;
      background: #f7f9ff;
    }
    .msg {
      display: flex;
      margin: 10px 0;
    }
    .msg-bot { justify-content: flex-start; }
    .msg-user { justify-content: flex-end; }
    .bubble {
      max-width: 86%;
      padding: 12px 14px;
      border-radius: 14px;
      white-space: pre-line;
      font-size: 14px;
      line-height: 1.55;
      box-shadow: 0 2px 10px rgba(0,0,0,.06);
    }
    .msg-bot .bubble {
      background: #fff;
      border: 1px solid rgba(0,0,0,.06);
    }
    .msg-user .bubble {
      background: #0a5fff;
      color: #fff;
    }
    .links {
      margin-top: 10px;
      font-size: 13px;
      line-height: 1.5;
    }
    .links a {
      color: #0a5fff;
      text-decoration: none;
      font-weight: 700;
    }
    .links a:hover { text-decoration: underline; }

    .panel {
      border-top: 1px solid rgba(0,0,0,.08);
      padding: 14px 14px 16px;
      background: #fff;
    }
    .panel .panel-title {
      font-weight: 800;
      font-size: 14px;
      margin-bottom: 10px;
      color: #0a3cff;
    }
    .btn-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .chip-btn {
      border: 1px solid rgba(10,95,255,.22);
      background: #fff;
      color: #0a3cff;
      padding: 10px 12px;
      border-radius: 999px;
      font-weight: 800;
      font-size: 13px;
      cursor: pointer;
      transition: transform .06s ease, background .12s ease;
    }
    .chip-btn:hover { background: rgba(10,95,255,.06); }
    .chip-btn:active { transform: scale(.98); }
    .chip-btn.main {
      border: none;
      background: rgba(10,95,255,.10);
    }
    .hint {
      margin-top: 10px;
      font-size: 12px;
      color: rgba(0,0,0,.55);
      line-height: 1.5;
    }
    .divider {
      height: 1px;
      background: rgba(0,0,0,.08);
      margin: 10px 0;
    }

</head>

    bubble.className = "bubble";
    bubble.textContent = text;

    wrap.appendChild(풍선껌);

    bubble.textContent = text;

    });

  function promptFAQSearch(categories, grouped) {
    const keyword = (prompt("검색할 키워드를 입력해 주세요.\n(예: 환불, 등록, 상담, 운영시간 등)") || "").trim();
    if (!keyword) return;

    // 전체 리스트로 합침
    const all = [];
    Object.values(grouped).forEach(arr => all.push(...arr));
    const k = keyword.toLowerCase();

    const matches = all.filter(x =>
      (x.q && String(x.q).toLowerCase().includes(k)) ||
      (x.a && String(x.a).toLowerCase().includes(k))
    );

    if (matches.length === 0) {
      addBotMessage(`'${keyword}' 관련 FAQ를 찾지 못했습니다.\n다른 키워드로 다시 시도해 주세요.`);
      return;
    }

    addBotMessage(`'${keyword}' 관련 질문 ${matches.length}개를 찾았습니다.\n원하는 질문을 선택해 주세요.`);

    btnTitle.textContent = "FAQ 검색 결과";
    btnList.innerHTML = "";

    matches.slice(0, 20).forEach(item => {
      const btn = document.createElement("button");
      btn.className = "chip-btn";
      btn.textContent = item.q;
      btn.onclick = () => showFAQAnswer(item, item.category || "기타", matches, categories, grouped);
      btnList.appendChild(btn);

    homeBtn.onclick = () => renderMainButtons();
    btnList.appendChild(homeBtn);
  }

  /* ===============================
     3) 성적별 수업 추천 로직
     - 추천 기준: ① 난이도(권장등급) ② 요일(시간) ③ 요일+난이도 조합
     - 수학 선택과목 키워드(수1/수2/미적/확통/기하/공통 등)도 "수학"으로 통합 인식
     =============================== */

  const RECO_MODE_LIST = [
    { key: "LEVEL", label: "난이도(등급) 기준" },
    { key: "DAYTIME", label: "요일(시간) 기준" },
    { key: "BOTH", label: "요일+난이도 조합" }
  ];

  const DAYTIME_LIST = [
    "월(오전)","월(오후)","월(저녁)",
    "화(오전)","화(오후)","화(저녁)",
    "수(오전)","수(오후)","수(저녁)",
    "목(오전)","목(오후)","목(저녁)",
    "금(오전)","금(오후)","금(저녁)",
    "토(오전)","토(오후)","토(저녁)",
    "일(오전)","일(오후)","일(저녁)"
  ];

  function normalizeSubject(rawSubject) {
    const s = String(rawSubject || "").replace(/\s/g, "");

    // ✅ 수학 선택과목/표기 통합
    const mathSet = [
      "수1","수2","수학1","수학2","미적","미적분","확통","확률과통계","기하","공통","수학",
      "공통,미적","미적,공통","공통+미적","미적+공통"
    ];
    if (mathSet.includes(s)) return "수학";

    // 국어 표기 통합
    if (["국어","언매","화작","언어와매체","화법과작문"].includes(s)) return "국어";

    // 사회/과학 일부 과목 확장(필요 시 계속 추가 가능)
    if (["사회","생활과윤리","윤리","한국사","사문","사회문화","정법","정치와법","경제","세계사","동아시아사"].includes(s)) return "사회";
    if (["과학","물리학1","물리1","물리","화학1","화학","생명과학1","생명","지구과학1","지구"].includes(s)) return "과학";

    if (["영어"].includes(s)) return "영어";
    if (["논술"].includes(s)) return "논술";

    return s;
  }

  function hasDayTimeFields() {
    // russel.json에 요일/시간 정보가 들어있어야 DAYTIME/BOTH 추천 가능
    return COURSE_DATA.some(x => x.day || x.요일 || x.time_raw || x.time || x.시간);
  }

  function matchLevel(item, levelText) {
    // level_text 우선, 없으면 level/등급/grade도 시도
    const lvl = String(item.level_text || item.level || item.등급 || item.grade || "").trim();
    if (!levelText) return true;
    if (!lvl) return false;
    return lvl === levelText;
  }

  function matchDayTime(item, dayTimeText) {
    if (!dayTimeText) return true;

    const day = String(item.day || item.요일 || "");
    const time = String(item.time_raw || item.time || item.시간 || "");

    // 데이터가 없으면 매칭 불가
    if (!day && !time) return false;

    // 입력: "월(오전)" 형태
    const m = dayTimeText.match(/^(.+)\((.+)\)$/);
    if (!m) return true;

    const d = m[1];
    const part = m[2];

    // 요일 포함 여부(느슨하게)
    if (day && !day.includes(d)) return false;

    // 시간대 판정(시간 문자열에서 첫 시:분을 찾음)
    const hh = (time.match(/(\d{1,2})\s*:/) || [])[1];
    if (!hh) return true;

    const h = Number(hh);
    if (part === "오전") return h < 12;
    if (part === "오후") return h >= 12 && h < 18;
    return h >= 18; // 저녁
  }

  function recommendCoursesByMode(subject, levelText, dayTimeText, modeKey) {
    const targetSubject = String(subject || "").replace(/\s/g, "");
    let list = COURSE_DATA.filter(item => normalizeSubject(item.subject) === targetSubject);

    if (modeKey === "LEVEL") {
      list = list.filter(item => matchLevel(item, levelText));
    } else if (modeKey === "DAYTIME") {
      list = list.filter(item => matchDayTime(item, dayTimeText));
    } else if (modeKey === "BOTH") {
      list = list.filter(item => matchLevel(item, levelText) && matchDayTime(item, dayTimeText));
    }
    return list;
  }

            "난이도(등급) 기준으로 안내할게요."
          );
          return renderRecommendLevelButtons("LEVEL", sub, null);
        }

        // DAYTIME / BOTH
        return renderRecommendDayTimeButtons(modeKey, sub);

    backBtn.className = "chip-btn";
    backBtn.textContent = "◀ 기준 다시 선택";
    backBtn.onclick = () => renderRecommendModeButtons();
    btnList.appendChild(backBtn);

    homeBtn.className = "chip-btn";
    homeBtn.textContent = "◀ 처음으로";
    homeBtn.onclick = () => renderMainButtons();
    btnList.appendChild(homeBtn);
  }

  function renderRecommendDayTimeButtons(modeKey, subject) {
    btnTitle.textContent = subject + " / 요일(시간) 선택";
    btnList.innerHTML = "";

    DAYTIME_LIST.forEach(dt => {

        if (modeKey === "DAYTIME") return showRecommendResult(modeKey, subject, null, dt);
        // BOTH면 등급 선택으로 이동

      btnList.appendChild(btn);
    });

    const backBtn = document.createElement("button");
    backBtn.className = "chip-btn";
    backBtn.textContent = "◀ 과목 다시 선택";
    backBtn.onclick = () => renderRecommendSubjectButtons(modeKey);

    btnTitle.textContent = dayTimeText ? `${subject} / ${dayTimeText} / 등급 선택` : `${subject} / 등급 선택`;

    btnList.appendChild(homeBtn);

  function showRecommendResult(modeKey, subject, levelText, dayTimeText) {
    if (!COURSE_LOADED && !COURSE_LOAD_FAILED && COURSE_DATA.length === 0) {
      addBotMessage("시간표 데이터가 아직 로딩되지 않았습니다.\n잠시 후 다시 성적별 수업 추천을 눌러 주세요.");
      return;
    }

    if (COURSE_LOAD_FAILED) {
      addBotMessage(
        "시간표 데이터(russel.json) 로딩에 실패했습니다.\n\n" +
        "✅ 확인사항\n" +
        "1) index.html과 russel.json이 같은 폴더에 있는지\n" +
        "2) 파일을 더블클릭이 아니라 Live Server/서버 환경에서 열었는지\n" +
        "3) russel.json이 유효한 JSON인지"
      );
      return;
    }

    const list = recommendCoursesByMode(subject, levelText, dayTimeText, modeKey);

    let head = `『${subject}』 추천 결과\n\n`;
    if (modeKey === "LEVEL") head = `『${subject} / ${levelText}』 추천 결과\n\n`;
    if (modeKey === "DAYTIME") head = `『${subject} / ${dayTimeText}』 추천 결과\n\n`;
    if (modeKey === "BOTH") head = `『${subject} / ${dayTimeText} / ${levelText}』 추천 결과\n\n`;

    let msg = head;

    if (!list || list.length === 0) {
      msg += "해당 조건의 강좌가 없습니다.";
      addBotMessage(msg);
      return;
    }

    list.slice(0, 15).forEach((item, i) => {
      const lecture = item.lecture || item.title || item.강좌명 || "";
      const teacher = item.teacher || item.선생님 || "";
      const lvl = item.level_text || item.level || item.등급 || "";
      const day = item.day || item.요일 || "";
      const time = item.time_raw || item.time || item.시간 || "";

      msg += `${i + 1}. ${lecture}${teacher ? " - " + teacher : ""}\n`;
      if (lvl) msg += `   권장등급: ${lvl}\n`;
      if (day || time) msg += `   요일: ${day || "-"} / 시간: ${time || "-"}\n`;
      msg += "\n";
    });

    addBotMessage(msg.trim());
  }


  /* ===============================
     4) 나의 수강정보 / 환불 처리(우석 추가)
     =============================== */

  function extractNameAndId(input) {
    // 입력 예: "홍길동 12345678"
    const parts = String(input || "").trim().split(/\s+/);
    if (parts.length < 2) return null;
    const studentId = parts[parts.length - 1];
    const name = parts.slice(0, -1).join(" ");
    if (!name || !studentId) return null;
    return { name, studentId };
  }

  function sendRefundToSheet(type, name, studentId, courses) {
    fetch(SHEET_WEBHOOK_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ type, name, studentId, courses })
    })
      .then(res => res.text())
      .then(text => console.log("Google Sheet Response:", text))
      .catch(err => console.error("Error:", err));
  }

  function handleRefundSingle() {
    const raw = prompt("환불 신청자 성함과 학번을 입력해주세요.\n예) 홍길동 12345678");
    if (!raw) return;
    const student = extractNameAndId(raw);
    if (!student) {
      addBotMessage("입력 형식이 올바르지 않습니다.\n예) 홍길동 12345678");
      return;
    }
    const rawCourse = prompt("환불할 강좌명을 입력해주세요.\n예) 국어 OOO / 수학 OOO 등");
    if (!rawCourse) return;
    addUserMessage(`[환불신청(단과)]\n${student.name} (${student.studentId})\n강좌: ${rawCourse}`);
    addBotMessage("환불 신청이 접수되었습니다.\n담당자가 확인 후 처리 안내드리겠습니다.");

    sendRefundToSheet("single", student.name, student.studentId, [rawCourse]);
  }

  function handleRefundMulti() {
    const raw = prompt("환불 신청자 성함과 학번을 입력해주세요.\n예) 홍길동 12345678");
    if (!raw) return;
    const student = extractNameAndId(raw);
    if (!student) {
      addBotMessage("입력 형식이 올바르지 않습니다.\n예) 홍길동 12345678");
      return;
    }

    // 현재 수강중 강좌 목록이 있다면 선택 UI로, 없으면 입력받기
    let courses = [];
    if (currentCoursesData && currentCoursesData.length > 0) {
      const pick = prompt("환불할 강좌 번호를 콤마로 입력해주세요.\n" +
        currentCoursesData.map((c, i) => `${i+1}) ${c}`).join("\n") +
        "\n\n예) 1,3,4");
      if (!pick) return;
      const nums = pick.split(",").map(x => Number(x.trim())).filter(n => n >= 1 && n <= currentCoursesData.length);
      courses = nums.map(n => currentCoursesData[n-1]);
    } else {
      const rawCourses = prompt("환불할 강좌명을 여러 개 입력해주세요.\n각 강좌는 줄바꿈으로 구분\n예)\n국어 OOO\n수학 OOO\n영어 OOO");
      if (!rawCourses) return;
      courses = rawCourses.split("\n").map(x => x.trim()).filter(Boolean);
    }

    addUserMessage(`[환불신청(복수)]\n${student.name} (${student.studentId})\n강좌:\n- ${courses.join("\n- ")}`);
    addBotMessage("환불 신청이 접수되었습니다.\n담당자가 확인 후 처리 안내드리겠습니다.");

    sendRefundToSheet("multi", student.name, student.studentId, courses);
  }
